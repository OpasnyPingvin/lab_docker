version: '3.8'

services:
  db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4;'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: web_db
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysql", "-u", "db_user", "-pdb_password", "-e", "SELECT 1;"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: db_user
      DB_PASS: db_password
      DB_NAME: web_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
